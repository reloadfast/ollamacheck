name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.20.1'
        cache: 'pnpm'

    - name: Install pnpm
      run: |
        npm install -g pnpm@latest
        echo "pnpm version:"
        pnpm --version

    - name: Install build dependencies for native modules
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      env:
        PNPM_CACHE_DIR: ~/.pnpm-store

    - name: Lint code
      run: pnpm lint
      env:
        PNPM_CACHE_DIR: ~/.pnpm-store

    - name: Run tests
      run: pnpm test
      env:
        PNPM_CACHE_DIR: ~/.pnpm-store

    - name: Build API
      run: pnpm build:api
      env:
        PNPM_CACHE_DIR: ~/.pnpm-store

    - name: Build Web
      run: pnpm build:web
      env:
        PNPM_CACHE_DIR: ~/.pnpm-store

    - name: Run integration tests
      run: pnpm test:api
      env:
        PNPM_CACHE_DIR: ~/.pnpm-store
