name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.20.1'
        cache: 'npm'

    - name: Debug environment
      run: |
        echo "Node version:"
        node --version
        echo "NPM version:"
        npm --version
        echo "Which node:"
        which node
        echo "PATH:"
        echo $PATH

    - name: Install pnpm from scratch
      run: |
        # Debug what's available
        echo "Before installation:"
        command -v pnpm || echo "pnpm not found"

        # Remove any existing pnpm installations
        if command -v pnpm > /dev/null; then
          echo "Removing existing pnpm installation"
          sudo rm -f $(which pnpm)
        fi

        # Install pnpm using npm with forced reinstall
        echo "Installing pnpm..."
        npm install -g pnpm@latest --force

        # Verify installation
        echo "After installation:"
        if command -v pnpm > /dev/null; then
          echo "pnpm installed successfully"
          pnpm --version
        else
          echo "ERROR: pnpm installation failed"
          exit 1
        fi

    - name: Install build dependencies for native modules
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      env:
        PNPM_CACHE_DIR: ~/.pnpm-store

    - name: Lint code
      run: pnpm lint
      env:
        PNPM_CACHE_DIR: ~/.pnpm-store

    - name: Run tests
      run: pnpm test
      env:
        PNPM_CACHE_DIR: ~/.pnpm-store

    - name: Build API
      run: pnpm build:api
      env:
        PNPM_CACHE_DIR: ~/.pnpm-store

    - name: Build Web
      run: pnpm build:web
      env:
        PNPM_CACHE_DIR: ~/.pnpm-store

    - name: Run integration tests
      run: pnpm test:api
      env:
        PNPM_CACHE_DIR: ~/.pnpm-store
